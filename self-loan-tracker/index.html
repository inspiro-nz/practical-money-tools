const { useState, useMemo, useRef, useEffect } = React;

// ── STABLE KEYS — never change; user data persists automatically ──────────
const STORAGE_KEY  = "slt-loan-tracker";
const AV_KEY_STORE = "slt-av-key";
const LEGACY_KEYS  = ["slt-data-v6","slt-data-v5","slt-data-v4"];

// ── Formatting helpers ────────────────────────────────────────────────────
const fmt    = n => (isNaN(n)||n==null)?"—":n.toLocaleString("en-NZ",{style:"currency",currency:"NZD",maximumFractionDigits:2});
const fmtPct = n => (isNaN(n)||n==null)?"—":`${n>=0?"+":""}${n.toFixed(2)}%`;
const today  = () => new Date().toISOString().slice(0,10);

// ── Theme colour helper ───────────────────────────────────────────────────
// Reads live CSS variable from :root so it works in both light and dark mode.
// Falls back to a safe neutral if called before the DOM is ready.
function cssVar(name) {
  if (typeof getComputedStyle === "undefined") return "#888";
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || "#888";
}

// sc() returns a colour string for positive/negative/null values.
// Identical contract to original — used directly in style={{color:sc(v)}}.
const sc = v => {
  if (v == null || isNaN(v)) return cssVar("--text-faint");
  return v >= 0 ? cssVar("--pos") : cssVar("--neg");
};

// ── Default state ─────────────────────────────────────────────────────────
const DEFAULT = {
  annualReturn: 8,
  months: 24,
  sp500Baseline: null,
  priceHistory: [],
  drawdowns: [],
  repayments: [],
};

// ── localStorage helpers ──────────────────────────────────────────────────
function load(key, def) {
  try {
    const r = localStorage.getItem(key);
    if (r) return JSON.parse(r);
    for (const lk of LEGACY_KEYS) {
      const old = localStorage.getItem(lk);
      if (old) {
        const p = JSON.parse(old);
        if (p.priceHistory) p.priceHistory = p.priceHistory.filter(h => h.portfolioValue > 0);
        localStorage.setItem(key, JSON.stringify(p));
        localStorage.removeItem(lk);
        return p;
      }
    }
    return def;
  } catch { return def; }
}

function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); }
  catch (e) {
    console.warn('[SLT] localStorage save failed — storage may be full:', e.message);
    if (!document.getElementById('slt-quota-warn')) {
      const d = document.createElement('div');
      d.id = 'slt-quota-warn';
      Object.assign(d.style, {
        position:'fixed', top:'8px', left:'50%', transform:'translateX(-50%)',
        background: cssVar("--card"),
        border: `1px solid ${cssVar("--neg")}88`,
        color: cssVar("--neg"),
        padding:'10px 20px', borderRadius:'8px', fontSize:'12px', zIndex:'9999',
        fontFamily:"'Libre Baskerville',Georgia,serif",
        boxShadow:'0 4px 20px rgba(0,0,0,0.25)'
      });
      d.textContent = '⚠ Data could not be saved — storage may be full. Export a backup now.';
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 8000);
    }
  }
}

// ── Alpha Vantage fetch ───────────────────────────────────────────────────
async function fetchAlphaVantage(apiKey) {
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=SPY&outputsize=compact&apikey=${apiKey}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} from Alpha Vantage`);
  const data = await res.json();
  if (data["Note"])          throw new Error("Rate limit reached — free tier: 25 calls/day.");
  if (data["Information"])   throw new Error(data["Information"]);
  if (data["Error Message"]) throw new Error(data["Error Message"]);
  const series = data["Time Series (Daily)"];
  if (!series) throw new Error("Keys in response: " + Object.keys(data).join(", "));
  const dates = Object.keys(series).sort((a,b) => b.localeCompare(a));
  const gc = d => parseFloat(series[d]["4. close"]);
  const price = gc(dates[0]);
  const thisYear = new Date().getFullYear().toString();
  const ytdStart = dates.filter(d => d.startsWith(thisYear)).pop() || dates[dates.length-1];
  return {
    price,
    series,
    changeToday: dates.length > 1  ? ((price - gc(dates[1])) / gc(dates[1])) * 100 : null,
    change1W:    dates.length > 5  ? ((price - gc(dates[Math.min(5,  dates.length-1)])) / gc(dates[Math.min(5,  dates.length-1)])) * 100 : null,
    change1M:    dates.length > 22 ? ((price - gc(dates[Math.min(22, dates.length-1)])) / gc(dates[Math.min(22, dates.length-1)])) * 100 : null,
    changeYTD:   ((price - gc(ytdStart)) / gc(ytdStart)) * 100,
    lastUpdated: new Date(dates[0]).toLocaleDateString("en-NZ", {day:"numeric", month:"short", year:"numeric"}),
    source: "Alpha Vantage (SPY)"
  };
}

// ── Historical backfill ───────────────────────────────────────────────────
function buildBackfill(series, drawdowns, repayments) {
  const todayDate = today();
  const active = drawdowns.filter(d => d.date <= todayDate);
  if (active.length === 0) return { entries: [], baseline: null };
  const earliestDate = active.reduce((min, d) => d.date < min ? d.date : min, active[0].date);
  const dates = Object.keys(series).sort((a, b) => a.localeCompare(b));
  const gc = d => parseFloat(series[d]["4. close"]);
  const baselineDate = dates.find(d => d >= earliestDate);
  if (!baselineDate) return { entries: [], baseline: null };
  const backfillBaseline = gc(baselineDate);
  const entries = [];
  for (const date of dates) {
    if (date < earliestDate || date > todayDate) continue;
    const spyPrice = gc(date);
    const totalDrawnAsOf = drawdowns
      .filter(d => d.date <= date && d.date <= todayDate)
      .reduce((s, d) => s + d.amount, 0);
    if (totalDrawnAsOf === 0) continue;
    const totalRepaidAsOf = repayments
      .filter(r => r.date <= date)
      .reduce((s, r) => s + r.amount, 0);
    entries.push({ date, spyPrice, portfolioValue: totalDrawnAsOf * (spyPrice / backfillBaseline), cumulativePaid: totalRepaidAsOf });
  }
  return { entries, baseline: backfillBaseline };
}

// ── SVG Line Chart ────────────────────────────────────────────────────────
function LineChart({ history, loanAmount }) {
  const [tip, setTip] = useState(null);
  const svgRef  = useRef(null);
  const rectRef = useRef(null);
  useEffect(() => {
    const update = () => { if (svgRef.current) rectRef.current = svgRef.current.getBoundingClientRect(); };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, [history]);

  // Empty state
  if (!history || history.length < 2) return (
    <div style={{padding:"32px 20px 20px", textAlign:"center"}}>
      <svg viewBox="0 0 280 120" style={{width:"100%", maxWidth:280, height:"auto", marginBottom:20, opacity:0.45}}>
        {[0,1,2,3].map(i => (
          <line key={i} x1="30" y1={20+i*22} x2="260" y2={20+i*22} stroke={cssVar("--border")} strokeWidth="1"/>
        ))}
        <polyline points="30,90 80,72 130,55 180,38 230,24 260,18"
          fill="none" stroke={cssVar("--primary")} strokeWidth="2" strokeDasharray="5,4"
          strokeLinecap="round" strokeLinejoin="round" opacity="0.6"/>
        <polyline points="30,90 80,80 130,68 180,57 230,46 260,40"
          fill="none" stroke={cssVar("--blue")} strokeWidth="2" strokeDasharray="5,4"
          strokeLinecap="round" strokeLinejoin="round" opacity="0.5"/>
        <circle cx="30" cy="90" r="4" fill={cssVar("--primary")} opacity="0.6"/>
        <text x="180" y="32" fill={cssVar("--primary")} fontSize="9" opacity="0.7" fontFamily="'DM Mono',monospace">portfolio growth</text>
        <text x="180" y="52" fill={cssVar("--blue")}    fontSize="9" opacity="0.7" fontFamily="'DM Mono',monospace">your repayments</text>
      </svg>
      <div style={{fontSize:13, color: cssVar("--text-faint"), marginBottom:6}}>Chart builds as you go</div>
      <p style={{fontSize:12, color: cssVar("--text-faint"), lineHeight:1.7, maxWidth:320, margin:"0 auto"}}>
        Two lines will appear here: the teal line tracks what your withdrawals would be worth if left invested,
        and the blue line tracks your cumulative repayments. When they meet, you've broken even.
      </p>
      <p style={{fontSize:11, color: cssVar("--text-faint"), marginTop:12}}>
        Refresh market data twice to see your first data points.
      </p>
    </div>
  );

  const W=680, H=220, PL=64, PR=20, PT=16, PB=36;
  const iW = W-PL-PR, iH = H-PT-PB;
  const allV = [...history.map(h=>h.portfolioValue), ...history.map(h=>h.cumulativePaid), loanAmount];
  const minV = Math.min(...allV) * 0.97;
  const maxV = Math.max(...allV) * 1.03;
  const xs = i  => PL + (i / (history.length-1)) * iW;
  const ys = v  => PT + iH - ((v - minV) / (maxV - minV)) * iH;
  const line = (arr, color, dash) => {
    const d = arr.map((v,i) => `${i===0?"M":"L"}${xs(i).toFixed(1)},${ys(v).toFixed(1)}`).join(" ");
    return <path d={d} fill="none" stroke={color} strokeWidth="2"
      strokeDasharray={dash ? "6,4" : "none"} strokeLinecap="round" strokeLinejoin="round"/>;
  };
  const fK = v => v >= 1000 ? `$${(v/1000).toFixed(1)}k` : `$${v.toFixed(0)}`;
  const onMove = e => {
    const svg = svgRef.current; if (!svg) return;
    const rect = rectRef.current || svg.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width) - PL;
    const idx = Math.max(0, Math.min(history.length-1, Math.round((x/iW) * (history.length-1))));
    const svgW = rect.width;
    const tipLeft = xs(idx) / W * svgW;
    const isRight = idx > history.length * 0.6;
    setTip({idx, tipLeft, svgW, isRight});
  };
  const t = tip ? history[tip.idx] : null;
  const C = { primary: cssVar("--primary"), blue: cssVar("--blue"), border: cssVar("--border"),
              borderMid: cssVar("--border-mid"), faint: cssVar("--text-faint"),
              muted: cssVar("--text-muted"), card: cssVar("--card"), pos: cssVar("--pos"), neg: cssVar("--neg") };
  return (
    <div style={{position:"relative"}}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height:"auto", cursor:"crosshair"}}
        onMouseMove={onMove} onMouseLeave={() => setTip(null)}>
        {[0,1,2,3,4].map(i => {
          const v = minV + (i/4) * (maxV-minV);
          const y = ys(v);
          return <g key={i}>
            <line x1={PL} y1={y} x2={W-PR} y2={y} stroke={C.border} strokeWidth="1"/>
            <text x={PL-6} y={y+4} textAnchor="end" fill={C.faint} fontSize="10" fontFamily="'DM Mono',monospace">{fK(v)}</text>
          </g>;
        })}
        <line x1={PL} y1={ys(loanAmount)} x2={W-PR} y2={ys(loanAmount)} stroke={C.borderMid} strokeWidth="1" strokeDasharray="4,4"/>
        {line(history.map(h => h.portfolioValue), C.primary, false)}
        {line(history.map(h => h.cumulativePaid), C.blue, true)}
        {history.map((h,i) => <g key={i}>
          <circle cx={xs(i)} cy={ys(h.portfolioValue)} r="3" fill={C.primary}/>
          <circle cx={xs(i)} cy={ys(h.cumulativePaid)} r="3" fill={C.blue}/>
        </g>)}
        {history.map((h,i) => {
          if (history.length > 8 && i % Math.ceil(history.length/6) !== 0 && i !== history.length-1) return null;
          return <text key={i} x={xs(i)} y={H-6} textAnchor="middle" fill={C.faint} fontSize="9" fontFamily="'DM Mono',monospace">{h.date.slice(5)}</text>;
        })}
        {tip && t && <line x1={xs(tip.idx)} y1={PT} x2={xs(tip.idx)} y2={H-PB} stroke={C.borderMid} strokeWidth="1" strokeDasharray="3,3"/>}
      </svg>
      {tip && t && (
        <div style={{
          position:"absolute", top:4,
          left: tip.isRight ? undefined : tip.tipLeft + 8,
          right: tip.isRight ? (tip.svgW - tip.tipLeft + 8) : undefined,
          background: C.card, border:`1px solid ${C.border}`, borderRadius:8,
          padding:"10px 14px", fontSize:12, pointerEvents:"none", minWidth:160,
          boxShadow:"0 4px 16px rgba(0,0,0,0.12)"
        }}>
          <div style={{color:C.faint, marginBottom:6, fontFamily:"'DM Mono',monospace", fontSize:10}}>{t.date}</div>
          <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:4}}>
            <span style={{width:10, height:2, background:C.primary, display:"inline-block"}}/>
            <span style={{color:C.muted}}>Portfolio</span>
            <span style={{color:C.primary, fontFamily:"'DM Mono',monospace", marginLeft:"auto"}}>{fmt(t.portfolioValue)}</span>
          </div>
          <div style={{display:"flex", alignItems:"center", gap:8}}>
            <span style={{width:10, height:2, background:C.blue, display:"inline-block"}}/>
            <span style={{color:C.muted}}>Repaid</span>
            <span style={{color:C.blue, fontFamily:"'DM Mono',monospace", marginLeft:"auto"}}>{fmt(t.cumulativePaid)}</span>
          </div>
          <div style={{marginTop:8, paddingTop:8, borderTop:`1px solid ${C.border}`, fontSize:11,
            color: t.portfolioValue <= t.cumulativePaid ? C.pos : C.neg}}>
            {t.portfolioValue <= t.cumulativePaid ? "✓ Ahead" : `Gap: ${fmt(t.portfolioValue - t.cumulativePaid)}`}
          </div>
        </div>
      )}
      <div style={{display:"flex", gap:20, marginTop:10, justifyContent:"center", flexWrap:"wrap"}}>
        {[[C.primary, false, "Portfolio if left invested"], [C.blue, true, "Cumulative repaid"], [C.borderMid, true, "Original loan total"]].map(([c,d,l]) => (
          <div key={l} style={{display:"flex", alignItems:"center", gap:6, fontSize:11, color: C.muted}}>
            <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke={c} strokeWidth="2" strokeDasharray={d?"5,3":"none"}/></svg>
            {l}
          </div>
        ))}
      </div>
    </div>
  );
}

    items: [
      {q:"What is a self-loan?", a:"A self-loan is when you withdraw money from your own investment portfolio to spend on something — and then commit to paying it back. Instead of selling investments permanently, you treat the withdrawal as a personal loan to yourself, with a repayment schedule that lets your portfolio stay invested (in theory) while you cover the expense."},
      {q:"What's the difference between a drawdown and a repayment?", a:"A drawdown is money you take OUT of your investment fund — each withdrawal you log in the Ledger tab. A repayment is money you put BACK — each deposit you make toward paying the loan off. The tracker compares your cumulative repayments against what your withdrawals would be worth if you'd left them invested the whole time."},
      {q:"What does 'Break-Even Monthly' mean?", a:"Break-Even Monthly is the minimum repayment you'd need to make each month so that, over your chosen term, your total repayments match the expected growth of your original investment. It uses the standard loan amortisation formula applied to your target annual return rate. If you pay this amount every month, you'll have repaid the full opportunity cost of the withdrawal by the end of the term."},
      {q:"What does 'Net Position' mean?", a:"Net Position compares how much you've actually repaid against what your withdrawals are worth today at current market prices. A green figure means you've repaid more than the current portfolio value — you're ahead. A red figure shows the gap still to close. It's not about the original dollar amount withdrawn; it's about whether your repayments have caught up to what leaving the money invested would have produced."},
    ]
  },
  {
    title: "Getting Started", icon: "◉",
    items: [
      {q:"How do I log my first withdrawal?", a:"Go to the Ledger tab, make sure you're on the Drawdowns sub-tab, enter the amount and the date it occurred, add an optional note (e.g. 'Holiday flights'), then tap Add Drawdown. The Dashboard will immediately update your outstanding balance and break-even payment."},
      {q:"Can I schedule a future drawdown I haven't made yet?", a:"Yes. When adding a drawdown, set the date to a future date. It will appear in the Ledger with a 'scheduled' label and show up in the upcoming banner on the Dashboard, but it won't count toward your active balance or break-even calculation until that date arrives."},
      {q:"How do I set up the free market data API key?", a:"Click 'Set Free API Key' in the top-right corner of the app. Visit alphavantage.co/support/#api-key, enter your email address, and you'll receive a free key instantly — no credit card required. The free tier gives you 25 API calls per day, which is more than enough for daily or weekly refreshes. Paste the key into the field and tap Save Key."},
      {q:"What if I don't want to use an API key?", a:"You can enter the index price manually using the text field on the Dashboard. Look up the current price at finance.yahoo.com (search ^GSPC). Note that the tracker uses SPY (an ETF that tracks the index) for API calls, so SPY price ≈ index ÷ 10. Manual entry works fine — it still saves a snapshot and updates all your calculations."},
    ]
  },
  {
    title: "The Numbers", icon: "◇",
    items: [
      {q:"Which annual return rate should I use?", a:"The default is 8%, which is a commonly cited long-run average real return for a broad market index fund. You can adjust this in the Settings tab. A higher rate makes the break-even payment larger (you're charging yourself more for the opportunity cost). Use whatever rate reflects your own expectations for your portfolio's long-term performance."},
      {q:"Why does the chart need at least 2 market refreshes to appear?", a:"The chart plots your portfolio value over time using saved price snapshots. Each time you refresh the market (or enter a manual price), a snapshot is saved for that day. You need at least two distinct data points to draw a line — so the chart appears from your second refresh onward. Snapshots are stored up to 104 entries (roughly two years of weekly refreshes)."},
      {q:"How is 'Portfolio Value (if left in)' calculated?", a:"It takes your total active drawdown amount and multiplies it by the ratio of the current index price to your baseline price (set on your first refresh). For example: if you withdrew $5,000 when the index was at $500, and it's now $550, the portfolio value would be $5,000 × (550 ÷ 500) = $5,500. This shows what that money would be worth today had you never withdrawn it."},
      {q:"What's the difference between 'Outstanding' and 'Net Position'?", a:"Outstanding is simple arithmetic: total drawn minus total repaid. It tells you how much of the original dollar amount you still owe yourself. Net Position is market-adjusted: it compares your repayments against the current market value of what you withdrew. Outstanding ignores market movement; Net Position reflects whether you've kept pace with the market's growth since your first withdrawal."},
    ]
  },
  {
    title: "Your Data", icon: "◎",
    items: [
      {q:"Where is my data stored? Is it sent anywhere?", a:"All your data — drawdowns, repayments, price history, and settings — is stored exclusively in your browser's localStorage under the key 'slt-loan-tracker'. Nothing is sent to any server. The app code is hosted on GitHub Pages as static files; there is no backend, no database, and no account. Your data never leaves your device."},
      {q:"Will updating index.html delete my data?", a:"No. Your data is stored in the browser independently of the app files. As long as the storage key 'slt-loan-tracker' remains unchanged (and it always will — this is intentional), any new version of the app will find your existing data automatically. Updating the HTML file on GitHub simply replaces the code; it has no effect on what's stored in localStorage."},
      {q:"How do I export a backup?", a:"Go to the Settings tab and tap 'Export Backup (JSON)'. This downloads a timestamped JSON file containing all your drawdowns, repayments, price history, and settings. Store it somewhere safe — iCloud Drive, Google Drive, or alongside your index.html file. To restore, use 'Import Backup (JSON)' on the same page."},
      {q:"Will clearing my browser cache or site data delete my data?", a:"Yes — if you clear site data for the domain where the app is hosted, localStorage is erased along with it. Clearing your browser cache alone (just cached files) does not affect localStorage. The risk comes from 'Clear site data' or 'Remove all data for this site' actions in browser settings. This is why the Settings tab recommends exporting a backup regularly."},
    ]
  },
];

function App() {
  const [state,       setState]     = useState(() => load(STORAGE_KEY, DEFAULT));
  const [avKey,       setAvKey]     = useState(() => localStorage.getItem(AV_KEY_STORE) || "");
  const [avKeyInput,  setAvKeyInput]= useState("");
  const [market,      setMarket]    = useState(null);
  const [loading,     setLoading]   = useState(false);
  const [error,       setError]     = useState("");
  const [tab,         setTab]       = useState("dashboard");
  const [ledgerTab,   setLedgerTab] = useState("drawdowns");
  const [showSetup,   setShowSetup] = useState(false);
  const [lastFetched, setLastFetched] = useState(null);
  const [manualPrice, setManual]    = useState("");
  const [isDark,      setIsDark]    = useState(() => document.documentElement.classList.contains("dark"));

  // Drawdown form
  const [ddAmt,  setDdAmt]  = useState("");
  const [ddDate, setDdDate] = useState(today());
  const [ddNote, setDdNote] = useState("");

  // Repayment form
  const [rpAmt,  setRpAmt]  = useState("");
  const [rpDate, setRpDate] = useState(today());

  const upd = patch => setState(s => { const n = {...s, ...patch}; save(STORAGE_KEY, n); return n; });

  // ── Theme toggle ─────────────────────────────────────────────────────────
  const toggleTheme = () => {
    const html = document.documentElement;
    html.classList.toggle("dark");
    const dark = html.classList.contains("dark");
    localStorage.setItem("pmt-theme", dark ? "dark" : "light");
    setIsDark(dark);
  };

  // ── API key ───────────────────────────────────────────────────────────────
  const saveKey = () => {
    const k = avKeyInput.trim();
    if (!k) { setError("Paste your Alpha Vantage key first"); return; }
    localStorage.setItem(AV_KEY_STORE, k);
    setAvKey(k); setAvKeyInput(""); setShowSetup(false); setError("");
  };

  // ── Core maths ────────────────────────────────────────────────────────────
  const todayStr      = today();
  const activeDrawdowns = useMemo(() => (state.drawdowns||[]).filter(d => d.date <= todayStr), [state.drawdowns, todayStr]);
  const futureDrawdowns = useMemo(() => (state.drawdowns||[]).filter(d => d.date >  todayStr), [state.drawdowns, todayStr]);
  const totalDrawn    = useMemo(() => activeDrawdowns.reduce((s,d) => s + d.amount, 0), [activeDrawdowns]);
  const totalFuture   = useMemo(() => futureDrawdowns.reduce((s,d) => s + d.amount, 0), [futureDrawdowns]);
  const totalRepaid   = useMemo(() => (state.repayments||[]).reduce((s,r) => s + r.amount, 0), [state.repayments]);
  const outstanding   = totalDrawn - totalRepaid;

  const r   = Math.pow(1 + state.annualReturn / 100, 1/12) - 1;
  const pmt = useMemo(() => {
    if (totalDrawn <= 0) return 0;
    const m = Math.max(state.months, 1);
    if (r === 0) return totalDrawn / m;
    return (totalDrawn * r) / (1 - Math.pow(1+r, -m));
  }, [totalDrawn, r, state.months]);

  const portfolioNow = (market?.changeFromBaseline != null && totalDrawn > 0)
    ? totalDrawn * (1 + market.changeFromBaseline / 100) : null;
  const netPos = portfolioNow != null ? totalRepaid - portfolioNow : null;

  // Onboarding
  const showWelcome = (state.drawdowns||[]).length === 0 && !state.sp500Baseline;

  // ── Snapshot helper ───────────────────────────────────────────────────────
  const addSnapshot = (spyPrice, baseline, repaidSoFar) => {
    const portfolioValue = totalDrawn * (spyPrice / baseline);
    const filtered = (state.priceHistory||[]).filter(h => h.date !== today());
    return [...filtered, {date:today(), spyPrice, portfolioValue, cumulativePaid:repaidSoFar}]
      .sort((a,b) => a.date.localeCompare(b.date))
      .slice(-104);
  };

  // ── Market fetch ──────────────────────────────────────────────────────────
  const fetchMarket = async () => {
    if (!avKey) { setShowSetup(true); return; }
    if (loading) return;
    setLoading(true); setError("");
    try {
      const parsed = await fetchAlphaVantage(avKey);
      const patch = {};
      let effectiveBaseline = state.sp500Baseline;
      let backfillEntries = null;

      if ((state.priceHistory||[]).length < 2 && parsed.series) {
        const bf = buildBackfill(parsed.series, state.drawdowns||[], state.repayments||[]);
        if (bf.entries.length > 0) {
          backfillEntries = bf.entries;
          if (!state.sp500Baseline && bf.baseline != null) {
            effectiveBaseline = bf.baseline;
            patch.sp500Baseline = bf.baseline;
          }
        }
      }

      if (!effectiveBaseline) {
        effectiveBaseline = parsed.price;
        patch.sp500Baseline = parsed.price;
      }

      parsed.changeFromBaseline = ((parsed.price - effectiveBaseline) / effectiveBaseline) * 100;
      setMarket(parsed);
      setLastFetched(new Date().toLocaleTimeString("en-NZ", {hour:"2-digit", minute:"2-digit"}));

      if (totalDrawn > 0) {
        const todaySnap = addSnapshot(parsed.price, effectiveBaseline, totalRepaid);
        if (backfillEntries) {
          const snapDates = new Set(todaySnap.map(h => h.date));
          patch.priceHistory = [
            ...todaySnap,
            ...backfillEntries.filter(e => !snapDates.has(e.date))
          ].sort((a, b) => a.date.localeCompare(b.date)).slice(-104);
        } else {
          patch.priceHistory = todaySnap;
        }
      }

      upd(patch);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  const applyManual = () => {
    const p = parseFloat(manualPrice);
    if (!p || p <= 0 || p > 100000) { setManual(""); return; }
    const baseline = state.sp500Baseline || p;
    setMarket({price:p, changeToday:null, change1W:null, change1M:null, changeYTD:null,
      changeFromBaseline: ((p-baseline)/baseline)*100, lastUpdated:"Manual entry", source:"Manual"});
    const patch = {};
    if (!state.sp500Baseline) patch.sp500Baseline = p;
    if (totalDrawn > 0) patch.priceHistory = addSnapshot(p, baseline, totalRepaid);
    upd(patch); setManual("");
  };

  // ── Drawdowns ─────────────────────────────────────────────────────────────
  const addDrawdown = () => {
    const amt = parseFloat(ddAmt);
    if (!amt || amt <= 0) return;
    const sorted = [...(state.drawdowns||[]), {id:Date.now(), date:ddDate, amount:amt, note:ddNote.trim()||"Investment fund withdrawal"}]
      .sort((a,b) => a.date.localeCompare(b.date));
    upd({drawdowns: sorted});
    setDdAmt(""); setDdNote("");
  };
  const delDrawdown = id => upd({drawdowns: (state.drawdowns||[]).filter(d => d.id !== id)});

  // ── Repayments ────────────────────────────────────────────────────────────
  const addRepayment = () => {
    const amt = parseFloat(rpAmt);
    if (!amt || amt <= 0) return;
    const sorted = [...(state.repayments||[]), {id:Date.now(), date:rpDate, amount:amt}]
      .sort((a,b) => a.date.localeCompare(b.date));
    upd({repayments: sorted});
    setRpAmt("");
  };
  const delRepayment = id => upd({repayments: (state.repayments||[]).filter(r => r.id !== id)});

  // ── Style helpers (theme-aware) ───────────────────────────────────────────
  // These replace hardcoded hex with CSS variable reads, keeping the same
  // spread pattern as the original (inp() / btn() used throughout JSX).
  const inp = (ex={}) => ({
    background: cssVar("--card-inner"),
    border: `1px solid ${cssVar("--border")}`,
    borderRadius: 8,
    padding: "11px 14px",
    color: cssVar("--text"),
    fontSize: 14,
    outline: "none",
    width: "100%",
    fontFamily: "'Libre Baskerville',Georgia,serif",
    ...ex
  });

  const btn = (ex={}) => ({
    border: `1px solid ${cssVar("--primary")}66`,
    borderRadius: 8,
    background: `${cssVar("--primary")}18`,
    color: cssVar("--primary"),
    padding: "10px 18px",
    cursor: "pointer",
    fontSize: 13,
    fontFamily: "'Libre Baskerville',Georgia,serif",
    ...ex
  });

  const TABS = [["dashboard","Dashboard"],["chart","Chart"],["ledger","Ledger"],["settings","Settings"],["faq","FAQ"]];

  // Shorthand colour refs — recalculated each render so theme switches instantly
  const C = {
    card:      cssVar("--card"),
    cardInner: cssVar("--card-inner"),
    border:    cssVar("--border"),
    border2:   cssVar("--border-mid"),
    bg:        cssVar("--bg"),
    bgAlt:     cssVar("--bg-alt"),
    text:      cssVar("--text"),
    muted:     cssVar("--text-muted"),
    faint:     cssVar("--text-faint"),
    primary:   cssVar("--primary"),
    primaryBg: cssVar("--primary-bg"),
    pos:       cssVar("--pos"),
    neg:       cssVar("--neg"),
    amber:     cssVar("--amber"),
    blue:      cssVar("--blue"),
  };

  return (
    <div style={{minHeight:"100vh", background: C.bg}}>

      {/* ── Site header ───────────────────────────────────────────────── */}
      <header className="site-header">
        <div className="site-header-inner">
          <div className="header-left">
            <a href="/practical-money-tools/" className="back-link">← Practical Money Tools</a>
            <span className="header-divider">|</span>
            <span className="site-title">Self-Loan Tracker</span>
          </div>
          <div className="header-right">
            <button
              className={`api-key-btn ${avKey ? "key-set" : "key-unset"}`}
              onClick={() => setShowSetup(v => !v)}
            >
              {avKey ? "✓ API Key Set" : "⚙ Set Free API Key"}
            </button>
            <button className="theme-btn" onClick={toggleTheme} title="Toggle light/dark">
              {isDark ? "☀️" : "🌙"}
            </button>
            {lastFetched && <span className="fetched-time">Fetched {lastFetched}</span>}
          </div>
        </div>
      </header>

      {/* ── API key setup bar ─────────────────────────────────────────── */}
      {showSetup && (
        <div className="setup-bar fade-in">
          <div className="setup-bar-inner">
            <p>
              <strong style={{color: C.primary}}>Free setup (2 min):</strong> Go to{" "}
              <a href="https://www.alphavantage.co/support/#api-key" target="_blank" rel="noopener noreferrer">
                alphavantage.co/support/#api-key
              </a>, enter your email — free key, no credit card, 25 calls/day.
            </p>
            <div className="setup-bar-row">
              <input type="text" placeholder="Paste your Alpha Vantage API key…"
                value={avKeyInput} onChange={e => setAvKeyInput(e.target.value)}
                onKeyDown={e => e.key === "Enter" && saveKey()}
                style={{...inp(), flex:1, minWidth:220, fontSize:13}}/>
              <button onClick={saveKey} style={btn()}>Save Key</button>
              {avKey && <button onClick={() => { localStorage.removeItem(AV_KEY_STORE); setAvKey(""); }}
                style={btn({background:"none", border:`1px solid ${C.neg}44`, color: C.neg})}>
                Remove
              </button>}
            </div>
          </div>
        </div>
      )}

      {/* ── Tab bar ───────────────────────────────────────────────────── */}
      <div className="tab-bar">
        <div className="tab-bar-inner">
          {TABS.map(([id, label]) => (
            <button key={id} className={`tab-btn${tab===id?" active":""}`}
              onClick={() => { setTab(id); setError(""); }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* ── Content ───────────────────────────────────────────────────── */}
      <div className="content-area">

        {/* ══ DASHBOARD ══ */}
        {tab === "dashboard" && (
          <>
            {showWelcome ? (
              <WelcomeScreen onGoToLedger={() => setTab("ledger")} onGoToSettings={() => setTab("settings")}/>
            ) : (
              <div className="fade-in">

                {/* Summary strip */}
                <div className={`summary-grid${futureDrawdowns.length>0?" mb-10":""}`}
                  style={{marginBottom: futureDrawdowns.length>0 ? 10 : 16}}>
                  {[
                    {label:"Active Drawdowns",  value: totalDrawn>0?fmt(totalDrawn):"—",
                      sub:`${activeDrawdowns.length} in effect today`, color: C.neg},
                    {label:"Total Repaid",       value: fmt(totalRepaid),
                      sub:`${(state.repayments||[]).length} payment${(state.repayments||[]).length!==1?"s":""}`, color: C.pos},
                    {label:"Outstanding",        value: totalDrawn>0?fmt(Math.abs(outstanding)):"—",
                      sub: totalDrawn>0 ? (outstanding<0 ? `✓ ${((-outstanding/totalDrawn)*100).toFixed(1)}% over-repaid`
                                                         : `${((outstanding/totalDrawn)*100).toFixed(1)}% of active drawn`)
                                        : "No active drawdowns yet",
                      color: outstanding<0 ? C.pos : C.amber},
                    {label:"Break-Even Monthly", value: totalDrawn>0?fmt(pmt):"—",
                      sub: totalDrawn>0 ? `at ${state.annualReturn}% p.a.` : "Increases as drawdowns activate",

                  ].map(({label,value,sub,color}) => (

                      <div className="stat-label">{label}</div>

                      <div className="stat-sub">{sub}</div>

                {/* Upcoming drawdowns banner */}

                  <div style={{background:C.card, border:`1px solid ${C.amber}33`, borderLeft:`3px solid ${C.amber}`,
                    borderRadius:10, padding:"12px 16px", marginBottom:16, boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
                    <div style={{fontSize:10, color: C.amber, textTransform:"uppercase", letterSpacing:"0.15em", marginBottom:8}}>
                      Scheduled — not yet active
                    </div>
                    <div style={{display:"flex", flexDirection:"column", gap:6}}>
                      {futureDrawdowns.map(d => (
                        <div key={d.id} style={{display:"flex", justifyContent:"space-between", alignItems:"center",
                          fontSize:12, flexWrap:"wrap", gap:4}}>
                          <span style={{color: C.faint, fontFamily:"'DM Mono',monospace"}}>{d.date}</span>
                          <span style={{color: C.muted, flex:1, paddingLeft:12}}>{d.note}</span>
                          <span style={{color: C.amber, fontFamily:"'DM Mono',monospace"}}>{fmt(d.amount)}</span>
                        </div>
                      ))}
                      <div style={{borderTop:`1px solid ${C.border}`, marginTop:4, paddingTop:8,
                        display:"flex", justifyContent:"space-between", fontSize:12}}>
                        <span style={{color: C.faint}}>Total scheduled</span>
                        <span style={{color: C.amber, fontFamily:"'DM Mono',monospace"}}>{fmt(totalFuture)}</span>
                      </div>
                    </div>
                  </div>
                )}

                {/* Market card */}
                <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:12,
                  padding:22, marginBottom:16, boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"center",
                    marginBottom:18, flexWrap:"wrap", gap:10}}>
                    <div style={{fontSize:10, letterSpacing:"0.2em", color: C.primary, textTransform:"uppercase"}}>
                      Investment Index{market?.source ? ` · ${market.source}` : ""}

                {label:"Target Annual Return %",  key:"annualReturn", type:"number",
                  note:"Expected return on your investments — charge yourself this rate to break even"},
                {label:"Repayment Term (months)", key:"months",       type:"number",
                  note:"How many months to repay over — break-even payment recalculates automatically"},
              ].map(({label,key,type,note}) => (
                <div key={key} style={{marginBottom:22}}>
                  <label style={{display:"block", fontSize:12, color:C.muted, marginBottom:3}}>{label}</label>
                  <div style={{fontSize:11, color:C.faint, marginBottom:8}}>{note}</div>
                  <input type={type} value={state[key]}
                    onChange={e => { const v=parseFloat(e.target.value); if(!isNaN(v)&&v>0) upd({[key]:v}); }}
                    style={{...inp(), maxWidth:200}}/>
                </div>
              ))}
              <div style={{background:C.cardInner, border:`1px solid ${C.border}`, borderRadius:8,
                padding:"14px", fontSize:12, color:C.muted, lineHeight:1.7}}>
                <strong style={{color:C.text}}>Note:</strong> Loan amount is driven by your Drawdowns ledger —
                there's no fixed amount to set here. Add each withdrawal in the Ledger tab and the break-even
                payment updates automatically.
              </div>
            </div>

            {/* Baseline */}
            <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:12,
              padding:22, marginBottom:16, boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
              <div style={{fontSize:10, letterSpacing:"0.2em", color:C.primary,
                textTransform:"uppercase", marginBottom:6, display:"flex", alignItems:"center"}}>
                Index Baseline
                <InfoTip text="Locked in on your first market refresh. All drift calculations compare the current index price against this starting point." />
              </div>
              <p style={{fontSize:12, color:C.muted, marginBottom:14, lineHeight:1.7}}>
                Locked in on your first market refresh. All drift calculations compare current price against this starting point.
              </p>
              <div style={{fontSize:24, color:C.primary, fontFamily:"'DM Mono',monospace",
                fontWeight:300, marginBottom:14}}>
                {state.sp500Baseline ? state.sp500Baseline.toLocaleString("en-US",{maximumFractionDigits:2}) : "Not set yet"}
              </div>
              {state.sp500Baseline && (
                <button onClick={() => upd({sp500Baseline:null})}
                  style={btn({background:"none", border:`1px solid ${C.neg}44`, color:C.neg, fontSize:11, padding:"7px 16px"})}>
                  Reset baseline
                </button>
              )}
            </div>

            {/* Backup & Restore */}
            <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:12,
              padding:22, boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
              <div style={{fontSize:10, letterSpacing:"0.2em", color:C.primary,
                textTransform:"uppercase", marginBottom:6}}>Backup &amp; Restore</div>
              <p style={{fontSize:12, color:C.muted, marginBottom:16, lineHeight:1.7}}>
                Your data is stored under a permanent key that <strong style={{color:C.text}}>never changes between app updates</strong> —
                so any new version will find your data automatically. The only risk is clearing browser site data.
                Export a backup JSON occasionally and keep it in iCloud Drive or next to the HTML file as insurance.
                If you ever switch browsers or get a new device, use Import to restore everything instantly.
              </p>
              <div style={{display:"flex", gap:10, flexWrap:"wrap", marginBottom:20}}>
                <button onClick={() => {
                  const data = JSON.stringify({...state, exportedAt:new Date().toISOString(), version:"slt-stable"}, null, 2);
                  const blob = new Blob([data], {type:"application/json"});
                  const url  = URL.createObjectURL(blob);
                  const a    = document.createElement("a");
                  a.href = url;
                  a.download = `self-loan-backup-${new Date().toISOString().slice(0,10)}.json`;
                  a.click();
                  URL.revokeObjectURL(url);
                  const toast = document.createElement("div");
                  toast.textContent = "✓ Backup downloaded";
                  Object.assign(toast.style, {
                    position:"fixed", bottom:"24px", right:"24px",
                    background: C.card, border:`1px solid ${C.pos}66`, color:C.pos,
                    padding:"10px 18px", borderRadius:"8px", fontSize:"13px", zIndex:9999,
                    fontFamily:"'Libre Baskerville',Georgia,serif",
                    boxShadow:"0 4px 16px rgba(0,0,0,0.12)"
                  });
                  document.body.appendChild(toast);
                  setTimeout(() => toast.remove(), 3000);
                }} style={btn({padding:"10px 18px"})}>
                  ⬇ Export Backup (JSON)
                </button>
                <label style={{...btn({padding:"10px 18px", cursor:"pointer"}), display:"inline-block"}}>
                  ⬆ Import Backup (JSON)
                  <input type="file" accept=".json" style={{display:"none"}} onChange={e => {
                    const file = e.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => {
                      try {
                        const parsed = JSON.parse(ev.target.result);
                        if (!parsed.drawdowns || !parsed.repayments)
                          throw new Error("Invalid backup — missing drawdowns or repayments fields");
                        if (window.confirm(`Import backup from ${parsed.exportedAt?.slice(0,10)||"unknown date"}?\n\nThis will replace all current data.`)) {
                          const {exportedAt, version, ...rest} = parsed;
                          if (rest.annualReturn!=null && (isNaN(rest.annualReturn)||rest.annualReturn<=0)) rest.annualReturn = DEFAULT.annualReturn;
                          if (rest.months!=null && (isNaN(rest.months)||rest.months<=0)) rest.months = DEFAULT.months;
                          if (rest.priceHistory) rest.priceHistory = rest.priceHistory.filter(h => h.portfolioValue > 0);
                          upd(rest);
                          setMarket(null);
                          alert("Data restored. Hit Refresh Market to reload live prices.");
                        }
                      } catch(err) { alert("Could not read backup: " + err.message); }
                    };
                    reader.readAsText(file);
                    e.target.value = "";
                  }}/>
                </label>
              </div>
              <div style={{borderTop:`1px solid ${C.border}`, paddingTop:16}}>
                <div style={{fontSize:10, letterSpacing:"0.2em", color:C.faint,
                  textTransform:"uppercase", marginBottom:10}}>Current data summary</div>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, fontSize:12, color:C.muted}}>
                  {[
                    ["Drawdowns",      `${(state.drawdowns||[]).length} entries`],
                    ["Repayments",     `${(state.repayments||[]).length} entries`],
                    ["Price snapshots",`${(state.priceHistory||[]).length} / 104`],
                    ["Baseline set",   state.sp500Baseline ? "Yes" : "No"],
                  ].map(([k,v]) => (
                    <div key={k} style={{background:C.cardInner, border:`1px solid ${C.border}`,
                      borderRadius:6, padding:"8px 12px", display:"flex", justifyContent:"space-between"}}>
                      <span>{k}</span>
                      <span style={{color:C.primary, fontFamily:"'DM Mono',monospace"}}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{marginTop:16, paddingTop:16, borderTop:`1px solid ${C.border}`, display:"flex", gap:10, flexWrap:"wrap"}}>
                <button onClick={() => {
                  if (window.confirm("Clear all price history snapshots? Drawdowns and repayments are kept."))
                    upd({priceHistory:[]});
                }} style={btn({background:"none", border:`1px solid ${C.neg}44`, color:C.neg, fontSize:11, padding:"7px 16px"})}>
                  Clear price history
                </button>
                <button onClick={() => {
                  if (window.confirm("Clear price history and re-backfill on the next market refresh?\n\nThis uses the full ~100-day series from Alpha Vantage to rebuild your chart history."))
                    upd({priceHistory:[]});
                }} style={btn({fontSize:11, padding:"7px 16px"})}>
                  ↺ Backfill history
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ══ FAQ ══ */}
        {tab === "faq" && <FAQAccordion/>}

      </div>

      {/* ── Footer ────────────────────────────────────────────────────── */}

        <div className="footer-links">

            target="_blank" rel="noopener noreferrer"
            style={{display:"inline-flex", alignItems:"center", gap:7, fontSize:11, color:"#EF496F",
              textDecoration:"none", opacity:0.75, transition:"opacity 0.15s"}}
            onMouseEnter={e => e.currentTarget.style.opacity=1}
            onMouseLeave={e => e.currentTarget.style.opacity=0.75}>
            <span style={{width:16, height:16, borderRadius:4, background:"#EF496F",
              display:"inline-flex", alignItems:"center", justifyContent:"center",
              fontSize:9, fontWeight:700, color:"#fff", flexShrink:0}}>S</span>

          <span className="footer-sep">·</span>

          <div style={{display:"inline-flex", alignItems:"center", gap:10}}>

              onMouseEnter={e => e.currentTarget.style.opacity=1}

              <span style={{width:16, height:16, borderRadius:4, background:"#FFDD00",

          <a href="/practical-money-tools/"
            style={{display:"inline-flex", alignItems:"center", gap:5, fontSize:11,

            onMouseEnter={e => e.currentTarget.style.opacity=1}

        </div>
        <p className="footer-legal">
          Data stored locally · Free market data via Alpha Vantage · Not financial advice · Inspiro
        </p>
      </div>

    </div>
  );
}
